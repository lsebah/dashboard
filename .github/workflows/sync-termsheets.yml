name: Sync termsheets (OneDrive)

# Monitore le dossier OneDrive « Termsheets » toutes les 2 h (et à la demande).
# Met à jour lib/termsheets-index.json (→ nouvelles TS visibles dans l'app),
# renomme optionnellement les fichiers non conformes, et ouvre une PR si l'index
# a changé. Nécessite les secrets Azure AD (voir scripts/sync-termsheets.mjs).
on:
  schedule:
    - cron: '0 */2 * * *' # toutes les 2 heures
  workflow_dispatch:
    inputs:
      rename:
        description: 'Renommer les fichiers non conformes (true/false)'
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Synchroniser le dossier Termsheets
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          GRAPH_DRIVE_ID: ${{ secrets.GRAPH_DRIVE_ID }}
          GRAPH_USER: ${{ secrets.GRAPH_USER }}
          GRAPH_FOLDER_PATH: ${{ secrets.GRAPH_FOLDER_PATH }}
          APP_URL: ${{ secrets.APP_URL }}
          SYNC_RENAME: ${{ github.event.inputs.rename || 'false' }}
        run: node scripts/sync-termsheets.mjs
      - name: Ouvrir une PR si l'index a changé
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: sync termsheets index (OneDrive)'
          title: 'Sync termsheets (OneDrive)'
          body: 'Mise à jour automatique de lib/termsheets-index.json depuis le dossier OneDrive Termsheets.'
          branch: auto/termsheets-sync
          add-paths: lib/termsheets-index.json
